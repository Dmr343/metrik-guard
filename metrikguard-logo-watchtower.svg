<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="#0b1d35"/>

  <!-- ICON centered -->
  <g transform="translate(200, 180)">
    <!-- Diamond outer -->
    <polygon points="0,-148  108,-58  0,32  -108,-58" fill="#ceff47"/>
    <!-- Diamond inner hollow -->
    <polygon points="0,-116  76,-58  0,0  -76,-58" fill="#0b1d35"/>
    <!-- Center dot -->
    <circle cx="0" cy="-58" r="20" fill="#ceff47"/>
    <!-- Tower column -->
    <rect x="-18" y="32" width="36" height="168" fill="#ceff47"/>
    <!-- Base platform -->
    <rect x="-72" y="198" width="144" height="14" fill="#ceff47"/>
  </g>

  <!-- Wordmark below icon -->
  <text x="200" y="444" text-anchor="middle"
    font-family="'Arial Black','Arial',sans-serif"
    font-weight="900" font-size="52" letter-spacing="8" fill="#ceff47">METRIK</text>
  <text x="200" y="500" text-anchor="middle"
    font-family="'Arial Black','Arial',sans-serif"
    font-weight="900" font-size="52" letter-spacing="8" fill="#f0f6ff">GUARD</text>
  <line x1="60" y1="514" x2="340" y2="514" stroke="#ceff47" stroke-width="1" opacity="0.3"/>
  <text x="200" y="534" text-anchor="middle"
    font-family="'Courier New',monospace"
    font-size="11" letter-spacing="4" fill="#7a9ab8">INTELIGENCIA EN SEGURIDAD</text>
</svg>
